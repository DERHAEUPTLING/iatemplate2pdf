name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Build Universal Binary
        run: |
          # Build for arm64 (native on macos-14)
          swift build -c release --arch arm64
          cp .build/release/iatemplate2pdf iatemplate2pdf-arm64

          # Build for x86_64
          swift build -c release --arch x86_64
          cp .build/release/iatemplate2pdf iatemplate2pdf-x86_64

          # Create Universal Binary
          lipo -create iatemplate2pdf-arm64 iatemplate2pdf-x86_64 -output iatemplate2pdf
          lipo -info iatemplate2pdf

      - name: Package
        run: |
          tar czf iatemplate2pdf-macos-universal.tar.gz iatemplate2pdf
          shasum -a 256 iatemplate2pdf-macos-universal.tar.gz > iatemplate2pdf-macos-universal.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            iatemplate2pdf-macos-universal.tar.gz
            iatemplate2pdf-macos-universal.tar.gz.sha256
